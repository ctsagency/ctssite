<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTS — Visual Agency · Product Design</title>
<meta name="description" content="CTS visual agency has moved. Visit our new website at coastteamstudio.com — 3D visualization, AI imagery and product design.">
<link rel="canonical" href="https://coastteamstudio.com/">
<link rel="preload" as="image" href="bg-2560.webp" media="(min-width: 701px)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green-deep:#46695c;
    --green-soft:#7ba392;
    --white:#ffffff;
    --shadow:0 10px 30px rgba(70,105,92,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    color:var(--white);
    background:#dcebe2;
  }
  .stage{
    position:relative;
    height:100vh;
    height:100svh;
    width:100%;
    overflow:hidden;
  }
  .stage img.bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    z-index:0;
  }
  .corner{
    position:absolute;
    z-index:2;
    font-weight:600;
    line-height:1.12;
    letter-spacing:.01em;
    font-size:clamp(2rem,4.6vw,4.2rem);
    text-shadow:0 2px 18px rgba(70,105,92,.15);
  }
  .corner .g{color:var(--green-deep)}
  .corner .w{color:var(--white)}
  .tl{top:clamp(1.4rem,4vh,3.4rem);left:clamp(1.4rem,4vw,3.8rem)}
  .bl{bottom:clamp(1.4rem,4vh,3.4rem);left:clamp(1.4rem,4vw,3.8rem)}
  .br{
    position:absolute;
    z-index:2;
    right:clamp(1.4rem,4vw,3.8rem);
    bottom:clamp(1.4rem,4vh,3.4rem);
    text-align:right;
    font-weight:500;
    font-size:clamp(.85rem,1.5vw,1.25rem);
    line-height:1.45;
    color:var(--white);
    text-shadow:0 1px 12px rgba(70,105,92,.25);
  }
  .cta-wrap{
    position:absolute;
    z-index:3;
    left:50%;
    top:76%;
    transform:translate(-50%,-50%);
    text-align:center;
    animation:rise .8s ease-out .15s both;
  }
  .cta-label{
    display:block;
    font-weight:500;
    font-size:clamp(.85rem,1.4vw,1.05rem);
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--green-deep);
    margin-bottom:.9rem;
  }
  .cta{
    display:inline-block;
    text-decoration:none;
    font-weight:600;
    font-size:clamp(1.05rem,2vw,1.5rem);
    color:var(--green-deep);
    background:var(--white);
    padding:.85em 1.7em;
    border-radius:999px;
    box-shadow:var(--shadow);
    transition:transform .18s ease,box-shadow .18s ease;
    white-space:nowrap;
  }
  .cta:hover{transform:translateY(-3px);box-shadow:0 16px 38px rgba(70,105,92,.36)}
  .cta:focus-visible{outline:3px solid var(--green-deep);outline-offset:4px}
  @keyframes rise{
    from{opacity:0;transform:translate(-50%,calc(-50% + 14px))}
    to{opacity:1;transform:translate(-50%,-50%)}
  }
  @media (prefers-reduced-motion:reduce){
    .cta-wrap{animation:none}
    .cta{transition:none}
  }
  @media (max-width:700px){
    .corner{font-size:clamp(1.6rem,8vw,2.2rem)}
    .cta-wrap{top:auto;bottom:26%;transform:translateX(-50%)}
    @keyframes rise{
      from{opacity:0;transform:translate(-50%,14px)}
      to{opacity:1;transform:translate(-50%,0)}
    }
    .br{right:50%;transform:translateX(50%);text-align:center;bottom:1.2rem;font-size:.8rem}
    .bl{bottom:5.2rem}
  }
</style>
</head>
<body>
<main class="stage">
  <picture>
    <source media="(max-width:700px)" srcset="bg-mobile.webp">
    <source media="(max-width:1400px)" srcset="bg-1600.webp">
    <source type="image/webp" srcset="bg-2560.webp">
    <img class="bg" src="bg-2560.jpg" alt="" fetchpriority="high">
  </picture>

  <h1 class="corner tl"><span class="g">Visual</span><br><span class="w">Agency</span></h1>

  <p class="corner bl"><span class="g">Product</span><br><span class="w">Design</span></p>

  <div class="cta-wrap">
    <span class="cta-label">We've moved</span>
    <a class="cta" href="https://coastteamstudio.com" rel="noopener">Visit our new website&nbsp;→&nbsp;coastteamstudio.com</a>
  </div>

  <p class="br">Coast Team Studio<br>2026. Georgia. Tbilisi</p>
</main>
</body>
</html>
